{% extends "base.html" %}
{% block title %}Deudas Pendientes - {{ lavanderia.nombre }}{% endblock %}

{% block content %}

<!-- Header -->
<div class="flex items-center justify-between mb-5">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Deudas</h1>
        <p class="text-sm text-slate-400 font-medium mt-0.5">Clientes con saldo pendiente</p>
    </div>
    <button onclick="cargarDeudas()"
            class="w-10 h-10 rounded-xl flex items-center justify-center transition-all"
            style="background:#f1f5f9" title="Actualizar">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
    </button>
</div>

<!-- Hero total -->
<div id="hero-total" class="rounded-3xl p-6 mb-5 relative overflow-hidden"
     style="background:linear-gradient(135deg,#dc2626 0%,#b91c1c 60%,#7f1d1d 100%)">
    <div class="absolute inset-0"
         style="background:radial-gradient(circle at 15% 25%, rgba(255,255,255,0.10), transparent 55%)"></div>
    <div class="skeleton h-3 w-28 opacity-40 mb-3"></div>
    <div class="skeleton h-14 w-40 opacity-40"></div>
    <div class="skeleton h-3 w-36 opacity-30 mt-3"></div>
</div>

<!-- Lista de deudores -->
<div id="lista-deudores">
    <div class="space-y-3">
        <div class="card p-4 skeleton h-24"></div>
        <div class="card p-4 skeleton h-24"></div>
        <div class="card p-4 skeleton h-24"></div>
    </div>
</div>

<script>
async function cargarDeudas() {
    const res = await fetch('/api/reportes/deudas');
    const d = await res.json();

    // ── Hero total ──
    document.getElementById('hero-total').innerHTML = `
        <div class="absolute inset-0"
             style="background:radial-gradient(circle at 15% 25%, rgba(255,255,255,0.10), transparent 55%)"></div>
        <div class="absolute top-4 right-4 w-24 h-24 rounded-full"
             style="background:rgba(255,255,255,0.05);transform:translate(20%,-20%)"></div>
        <p class="text-red-200 text-xs font-bold uppercase tracking-widest mb-1 relative">Total por cobrar</p>
        <p class="text-5xl font-black text-white tracking-tight mb-1 relative"
           style="font-feature-settings:'tnum'">$${d.total_general.toFixed(2)}</p>
        <p class="text-red-300 text-xs font-semibold relative">${d.total_clientes} cliente${d.total_clientes !== 1 ? 's' : ''} con deuda pendiente</p>
    `;

    // ── Lista de deudores ──
    const lista = document.getElementById('lista-deudores');

    if (d.deudores.length === 0) {
        lista.innerHTML = `
            <div class="card p-6 flex flex-col items-center gap-3 text-center">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center" style="background:#f0fdf4">
                    <svg class="w-7 h-7" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <div>
                    <p class="font-bold text-slate-800">Sin deudas pendientes</p>
                    <p class="text-sm text-slate-400 font-medium mt-0.5">Todos los clientes están al día</p>
                </div>
            </div>`;
        return;
    }

    lista.innerHTML = `
        <p class="section-label mb-3">Deudores</p>
        <div class="space-y-3">
            ${d.deudores.map((c, i) => `
            <div class="card p-4 card-press" style="border-left:4px solid ${i === 0 ? '#dc2626' : '#f87171'}">
                <div class="flex items-start justify-between gap-3">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-0.5">
                            <p class="font-bold text-slate-900 truncate">${c.nombre}</p>
                            ${i === 0 ? '<span class="shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:#fef2f2;color:#dc2626">Mayor deuda</span>' : ''}
                        </div>
                        <p class="text-xs text-slate-400 font-medium">${c.telefono}</p>
                        <p class="text-xs text-slate-400 font-medium mt-1">${c.ordenes_con_deuda} orden${c.ordenes_con_deuda !== 1 ? 'es' : ''} con saldo pendiente</p>
                    </div>
                    <p class="text-2xl font-black shrink-0" style="color:#dc2626;font-feature-settings:'tnum'">$${c.total_deuda.toFixed(2)}</p>
                </div>
                <div class="flex gap-2 mt-3">
                    <a href="https://wa.me/${c.telefono.replace(/\D/g,'')}?text=${encodeURIComponent('Hola ' + c.nombre + ', te contactamos de ECO PRETTY para recordarte que tienes un saldo pendiente de $' + c.total_deuda.toFixed(2))}"
                       target="_blank" rel="noopener noreferrer"
                       class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl font-semibold text-sm transition-all"
                       style="background:#25D366;color:#ffffff">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        WhatsApp
                    </a>
                    <a href="/?cliente_id=${c.cliente_id}&saldo_pendiente=1"
                       class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl font-semibold text-sm transition-all"
                       style="background:#fef2f2;color:#dc2626">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        Ver órdenes
                    </a>
                </div>
            </div>
            `).join('')}
        </div>
    `;
}

cargarDeudas();
</script>

{% endblock %}
