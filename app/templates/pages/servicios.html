{% extends "base.html" %}
{% block title %}Servicios - ECO PRETTY{% endblock %}

{% block content %}

<div class="flex items-center justify-between mb-5">
    <div>
        <h1 class="text-xl font-bold text-gray-800">Servicios</h1>
        <p class="text-sm text-gray-400">Precios y configuración</p>
    </div>
    <button onclick="abrirModalNuevo()"
            class="px-4 py-2 rounded-xl font-semibold text-sm text-white"
            style="background:#16a34a;border:none">
        + Nuevo
    </button>
</div>

<!-- Toggle activos/todos -->
<div class="flex gap-2 mb-4">
    <button id="btn-activos" onclick="filtrar('activos')"
            class="px-4 py-2 rounded-xl text-sm font-semibold transition-all"
            style="background:#16a34a;color:white;border:none">
        Activos
    </button>
    <button id="btn-todos" onclick="filtrar('todos')"
            class="px-4 py-2 rounded-xl text-sm font-semibold transition-all"
            style="background:#f3f4f6;color:#374151;border:none">
        Todos
    </button>
</div>

<div id="lista-servicios" class="space-y-3">
    <div class="text-center text-gray-300 py-12">Cargando...</div>
</div>

<!-- ===== MODAL: Nuevo servicio ===== -->
<div id="modal-nuevo" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.4);padding:16px">
    <div style="width:100%;max-width:480px;background:white;border-radius:16px;display:flex;flex-direction:column;max-height:85vh;overflow:hidden">
        <!-- Header fijo -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #f3f4f6;flex-shrink:0">
            <h3 style="font-size:1.125rem;font-weight:700;color:#1f2937;margin:0">Nuevo Servicio</h3>
            <button onclick="cerrarModales()" style="background:none;border:none;cursor:pointer;padding:4px;color:#9ca3af;font-size:1.25rem;line-height:1">✕</button>
        </div>
        <!-- Body scrolleable -->
        <div style="overflow-y:auto;flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px">
            <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:4px">Nombre del servicio</label>
                <input type="text" id="nuevo-nombre" placeholder="Ej: Lavado y planchado 10 camisas"
                       class="input-field">
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:8px">Tipo de precio</label>
                <div style="display:flex;gap:8px">
                    <button type="button" id="tipo-por-kilo"
                            onclick="seleccionarTipo('por_kilo')"
                            class="flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all"
                            style="border-color:#16a34a;background:#f0fdf4;color:#16a34a">
                        Por kilo
                    </button>
                    <button type="button" id="tipo-fijo"
                            onclick="seleccionarTipo('fijo')"
                            class="flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all"
                            style="border-color:#e5e7eb;background:white;color:#6b7280">
                        Precio fijo
                    </button>
                </div>
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:4px">
                    Precio ($) <span id="label-tipo" style="font-weight:400;color:#9ca3af">por kilo</span>
                </label>
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:1.5rem;font-weight:700;color:#9ca3af">$</span>
                    <input type="number" id="nuevo-precio" step="0.25" min="0.25" placeholder="0.00"
                           class="input-field text-xl font-bold flex-1">
                </div>
            </div>
        </div>
        <!-- Footer fijo -->
        <div style="flex-shrink:0;display:flex;gap:12px;padding:16px 24px 24px;border-top:1px solid #f3f4f6">
            <button onclick="cerrarModales()" class="btn-secondary flex-1">Cancelar</button>
            <button onclick="guardarNuevo()" id="btn-guardar-nuevo"
                    class="flex-1 py-3 rounded-xl font-semibold text-white"
                    style="background:#16a34a;border:none">
                Guardar
            </button>
        </div>
    </div>
</div>

<!-- ===== MODAL: Editar servicio ===== -->
<div id="modal-editar" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.4);padding:16px">
    <div style="width:100%;max-width:480px;background:white;border-radius:16px;display:flex;flex-direction:column;max-height:85vh;overflow:hidden">
        <!-- Header fijo -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid #f3f4f6;flex-shrink:0">
            <div>
                <h3 style="font-size:1.125rem;font-weight:700;color:#1f2937;margin:0">Editar Servicio</h3>
                <p id="edit-nombre-label" style="font-size:0.875rem;color:#6b7280;margin:4px 0 0"></p>
            </div>
            <button onclick="cerrarModales()" style="background:none;border:none;cursor:pointer;padding:4px;color:#9ca3af;font-size:1.25rem;line-height:1">✕</button>
        </div>
        <!-- Body scrolleable -->
        <div style="overflow-y:auto;flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px">
            <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:8px">Tipo de precio</label>
                <div style="display:flex;gap:8px">
                    <button type="button" id="edit-tipo-por-kilo"
                            onclick="seleccionarTipoEdit('por_kilo')"
                            class="flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all">
                        Por kilo
                    </button>
                    <button type="button" id="edit-tipo-fijo"
                            onclick="seleccionarTipoEdit('fijo')"
                            class="flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all">
                        Precio fijo
                    </button>
                </div>
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:4px">
                    Precio ($) <span id="edit-label-tipo" style="font-weight:400;color:#9ca3af"></span>
                </label>
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:1.5rem;font-weight:700;color:#9ca3af">$</span>
                    <input type="number" id="edit-precio" step="0.25" min="0.25"
                           class="input-field text-xl font-bold flex-1">
                </div>
            </div>
        </div>
        <!-- Footer fijo -->
        <div style="flex-shrink:0;display:flex;gap:12px;padding:16px 24px 24px;border-top:1px solid #f3f4f6">
            <button onclick="cerrarModales()" class="btn-secondary flex-1">Cancelar</button>
            <button onclick="guardarEdicion()" id="btn-guardar-edit"
                    class="flex-1 py-3 rounded-xl font-semibold text-white"
                    style="background:#16a34a;border:none">
                Guardar
            </button>
        </div>
    </div>
</div>

<script>
let todosServicios = [];
let filtroActual = 'activos';
let tipoNuevo = 'por_kilo';
let tipoEdit = 'por_kilo';
let servicioEditandoId = null;

async function cargarServicios() {
    const res = await fetch('/api/servicios/todos');
    todosServicios = await res.json();
    renderizar();
}

function filtrar(modo) {
    filtroActual = modo;
    document.getElementById('btn-activos').style.background = modo === 'activos' ? '#16a34a' : '#f3f4f6';
    document.getElementById('btn-activos').style.color = modo === 'activos' ? 'white' : '#374151';
    document.getElementById('btn-todos').style.background = modo === 'todos' ? '#16a34a' : '#f3f4f6';
    document.getElementById('btn-todos').style.color = modo === 'todos' ? 'white' : '#374151';
    renderizar();
}

function renderizar() {
    const lista = document.getElementById('lista-servicios');
    const servicios = filtroActual === 'activos'
        ? todosServicios.filter(s => s.activo)
        : todosServicios;

    if (!servicios.length) {
        lista.innerHTML = '<p class="text-center text-gray-400 py-8">No hay servicios</p>';
        return;
    }

    lista.innerHTML = servicios.map(s => {
        const tipoBadge = s.tipo_precio === 'fijo'
            ? '<span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:#eff6ff;color:#3b82f6">Fijo</span>'
            : '<span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:#f0fdf4;color:#16a34a">Por kg</span>';
        const precioLabel = s.tipo_precio === 'fijo'
            ? `$${parseFloat(s.precio_por_kilo).toFixed(2)}`
            : `$${parseFloat(s.precio_por_kilo).toFixed(2)}/kg`;
        const inactivoBadge = !s.activo
            ? '<span class="text-xs text-red-400 font-medium ml-1">(inactivo)</span>'
            : '';

        return `
        <div class="card p-4" style="${!s.activo ? 'opacity:0.6' : ''}">
            <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                        <p class="font-semibold text-gray-800 truncate">${s.nombre}</p>
                        ${inactivoBadge}
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        ${tipoBadge}
                        <span class="text-lg font-extrabold" style="color:#16a34a">${precioLabel}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="abrirModalEditar(${s.id}, '${s.nombre.replace(/'/g,"\\'")}', ${s.precio_por_kilo}, '${s.tipo_precio}')"
                            class="p-2 rounded-xl transition-all"
                            style="background:#f0fdf4;border:1.5px solid #bbf7d0"
                            title="Editar">
                        <svg class="w-4 h-4" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                    </button>
                    <button onclick="toggleActivo(${s.id}, ${s.activo})"
                            class="p-2 rounded-xl transition-all"
                            style="background:${s.activo ? '#fef2f2' : '#f0fdf4'};border:1.5px solid ${s.activo ? '#fecaca' : '#bbf7d0'}"
                            title="${s.activo ? 'Desactivar' : 'Activar'}">
                        ${s.activo
                            ? `<svg class="w-4 h-4" style="color:#ef4444" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                               </svg>`
                            : `<svg class="w-4 h-4" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                               </svg>`
                        }
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ---- Nuevo servicio ----
function abrirModalNuevo() {
    document.getElementById('nuevo-nombre').value = '';
    document.getElementById('nuevo-precio').value = '';
    seleccionarTipo('por_kilo');
    document.getElementById('modal-nuevo').classList.remove('hidden');
    setTimeout(() => document.getElementById('nuevo-nombre').focus(), 100);
}

function seleccionarTipo(tipo) {
    tipoNuevo = tipo;
    const btnKilo = document.getElementById('tipo-por-kilo');
    const btnFijo = document.getElementById('tipo-fijo');
    const label = document.getElementById('label-tipo');
    if (tipo === 'por_kilo') {
        btnKilo.style.cssText = 'border-color:#16a34a;background:#f0fdf4;color:#16a34a;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        btnFijo.style.cssText = 'border-color:#e5e7eb;background:white;color:#6b7280;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        label.textContent = 'por kilo';
    } else {
        btnKilo.style.cssText = 'border-color:#e5e7eb;background:white;color:#6b7280;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        btnFijo.style.cssText = 'border-color:#16a34a;background:#f0fdf4;color:#16a34a;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        label.textContent = 'precio fijo';
    }
}

async function guardarNuevo() {
    const nombre = document.getElementById('nuevo-nombre').value.trim();
    const precio = parseFloat(document.getElementById('nuevo-precio').value);
    if (!nombre) { mostrarToast('El nombre es obligatorio', 'error'); return; }
    if (!precio || precio <= 0) { mostrarToast('El precio debe ser mayor a 0', 'error'); return; }

    const btn = document.getElementById('btn-guardar-nuevo');
    btn.textContent = 'Guardando...'; btn.disabled = true;

    const res = await fetch('/api/servicios/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, precio, tipo_precio: tipoNuevo }),
    });

    btn.textContent = 'Guardar'; btn.disabled = false;
    if (res.ok) {
        cerrarModales();
        await cargarServicios();
        mostrarToast('Servicio creado');
    } else {
        const err = await res.json();
        mostrarToast(err.detail || 'Error al crear', 'error');
    }
}

// ---- Editar servicio ----
function abrirModalEditar(id, nombre, precio, tipo) {
    servicioEditandoId = id;
    document.getElementById('edit-nombre-label').textContent = nombre;
    document.getElementById('edit-precio').value = parseFloat(precio).toFixed(2);
    seleccionarTipoEdit(tipo || 'por_kilo');
    document.getElementById('modal-editar').classList.remove('hidden');
    setTimeout(() => document.getElementById('edit-precio').focus(), 100);
}

function seleccionarTipoEdit(tipo) {
    tipoEdit = tipo;
    const btnKilo = document.getElementById('edit-tipo-por-kilo');
    const btnFijo = document.getElementById('edit-tipo-fijo');
    const label = document.getElementById('edit-label-tipo');
    if (tipo === 'por_kilo') {
        btnKilo.style.cssText = 'border-color:#16a34a;background:#f0fdf4;color:#16a34a;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        btnFijo.style.cssText = 'border-color:#e5e7eb;background:white;color:#6b7280;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        label.textContent = 'por kilo';
    } else {
        btnKilo.style.cssText = 'border-color:#e5e7eb;background:white;color:#6b7280;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        btnFijo.style.cssText = 'border-color:#16a34a;background:#f0fdf4;color:#16a34a;flex:1;padding:0.75rem;border-radius:0.75rem;font-size:0.875rem;font-weight:600;border-width:2px;transition:all 0.2s';
        label.textContent = 'precio fijo';
    }
}

async function guardarEdicion() {
    const precio = parseFloat(document.getElementById('edit-precio').value);
    if (!precio || precio <= 0) { mostrarToast('El precio debe ser mayor a 0', 'error'); return; }

    const btn = document.getElementById('btn-guardar-edit');
    btn.textContent = 'Guardando...'; btn.disabled = true;

    const res = await fetch(`/api/servicios/${servicioEditandoId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ precio, tipo_precio: tipoEdit }),
    });

    btn.textContent = 'Guardar'; btn.disabled = false;
    if (res.ok) {
        cerrarModales();
        await cargarServicios();
        mostrarToast('Servicio actualizado');
    } else {
        mostrarToast('Error al guardar', 'error');
    }
}

// ---- Activar / Desactivar ----
async function toggleActivo(id, activo) {
    const res = await fetch(`/api/servicios/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ activo: !activo }),
    });
    if (res.ok) {
        await cargarServicios();
        mostrarToast(activo ? 'Servicio desactivado' : 'Servicio activado');
    } else {
        mostrarToast('Error al actualizar', 'error');
    }
}

function cerrarModales() {
    document.getElementById('modal-nuevo').classList.add('hidden');
    document.getElementById('modal-editar').classList.add('hidden');
    servicioEditandoId = null;
}

// Cerrar modal al tocar el fondo
document.getElementById('modal-nuevo').addEventListener('click', function(e) {
    if (e.target === this) cerrarModales();
});
document.getElementById('modal-editar').addEventListener('click', function(e) {
    if (e.target === this) cerrarModales();
});

cargarServicios();
</script>
{% endblock %}
