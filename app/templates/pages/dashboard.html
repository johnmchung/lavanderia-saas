{% extends "base.html" %}
{% block title %}Resumen - ECO PRETTY{% endblock %}

{% block content %}

<!-- Header -->
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Resumen</h1>
        <p class="text-sm text-slate-400 font-medium mt-0.5">Actualiza cada 30 s</p>
    </div>
    <button onclick="cargarDashboard()"
            class="w-10 h-10 rounded-xl flex items-center justify-center transition-all"
            style="background:#f1f5f9" title="Actualizar">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
    </button>
</div>

<div id="dashboard-content">
    <!-- Skeleton -->
    <div class="rounded-3xl p-6 mb-4 space-y-3" style="background:linear-gradient(135deg,#16a34a,#15803d)">
        <div class="skeleton h-3 w-24 opacity-40"></div>
        <div class="skeleton h-14 w-40 opacity-40"></div>
        <div class="grid grid-cols-3 gap-3 mt-4">
            <div class="skeleton h-14 opacity-30 rounded-2xl"></div>
            <div class="skeleton h-14 opacity-30 rounded-2xl"></div>
            <div class="skeleton h-14 opacity-30 rounded-2xl"></div>
        </div>
    </div>
    <div class="card p-5 mb-4 space-y-3">
        <div class="skeleton h-3 w-32"></div>
        <div class="grid grid-cols-2 gap-3">
            <div class="skeleton h-20 rounded-2xl"></div>
            <div class="skeleton h-20 rounded-2xl"></div>
            <div class="skeleton h-20 rounded-2xl"></div>
            <div class="skeleton h-20 rounded-2xl"></div>
        </div>
    </div>
</div>

<script>
async function cargarDashboard() {
    const res = await fetch('/api/dashboard/hoy');
    const d = await res.json();
    const div = document.getElementById('dashboard-content');

    const cobradoPct = d.ventas_total > 0
        ? Math.round((d.total_cobrado / d.ventas_total) * 100) : 0;

    div.innerHTML = `

        <!-- ── Hero card: ventas ── -->
        <div class="rounded-3xl p-6 mb-4 relative overflow-hidden"
             style="background:linear-gradient(135deg,#16a34a 0%,#15803d 60%,#14532d 100%)">
            <div class="absolute inset-0"
                 style="background:radial-gradient(circle at 15% 25%, rgba(255,255,255,0.12), transparent 55%)"></div>
            <div class="absolute top-4 right-4 w-24 h-24 rounded-full"
                 style="background:rgba(255,255,255,0.05);transform:translate(20%,-20%)"></div>

            <p class="text-green-200 text-xs font-bold uppercase tracking-widest mb-1 relative">Ventas de hoy</p>
            <p class="text-6xl font-black text-white tracking-tight mb-1 relative"
               style="font-feature-settings:'tnum'">$${d.ventas_total.toFixed(2)}</p>
            <p class="text-green-300 text-xs font-semibold mb-5 relative">${d.total_ordenes_hoy} orden${d.total_ordenes_hoy !== 1 ? 'es' : ''} recibida${d.total_ordenes_hoy !== 1 ? 's' : ''}</p>

            <!-- Sub-stats -->
            <div class="grid grid-cols-3 gap-2.5 relative">
                <div class="rounded-2xl p-3 text-center" style="background:rgba(255,255,255,0.12)">
                    <p class="text-white font-extrabold text-xl">$${d.total_cobrado.toFixed(2)}</p>
                    <p class="text-green-200 text-[10px] font-bold uppercase tracking-wide mt-0.5">Cobrado</p>
                </div>
                <div class="rounded-2xl p-3 text-center" style="background:rgba(255,255,255,0.12)">
                    <p class="text-white font-extrabold text-xl">$${d.pendiente_cobro.toFixed(2)}</p>
                    <p class="text-green-200 text-[10px] font-bold uppercase tracking-wide mt-0.5">Pendiente</p>
                </div>
                <div class="rounded-2xl p-3 text-center" style="background:rgba(255,255,255,0.12)">
                    <p class="text-white font-extrabold text-xl">${d.total_ordenes_hoy}</p>
                    <p class="text-green-200 text-[10px] font-bold uppercase tracking-wide mt-0.5">Órdenes</p>
                </div>
            </div>

            ${d.ventas_total > 0 ? `
            <!-- Progress bar cobrado -->
            <div class="mt-4 relative">
                <div class="h-1.5 rounded-full" style="background:rgba(255,255,255,0.2)">
                    <div class="h-full rounded-full transition-all duration-700"
                         style="background:white;width:${cobradoPct}%"></div>
                </div>
                <p class="text-green-200 text-[10px] font-semibold mt-1.5">${cobradoPct}% cobrado</p>
            </div>` : ''}
        </div>

        <!-- ── Status breakdown ── -->
        <div class="card p-5 mb-4">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Estado de órdenes de hoy</p>
            <div class="grid grid-cols-2 gap-3">

                <div class="rounded-2xl p-4 flex items-center gap-3" style="background:#eff6ff">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                         style="background:#dbeafe">
                        <svg class="w-5 h-5" style="color:#3b82f6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-3xl font-black" style="color:#2563eb;line-height:1">${d.ordenes_por_estatus.recibido || 0}</p>
                        <p class="text-[11px] font-bold mt-0.5" style="color:#3b82f6">Recibido</p>
                    </div>
                </div>

                <div class="rounded-2xl p-4 flex items-center gap-3" style="background:#fff7ed">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                         style="background:#fed7aa">
                        <svg class="w-5 h-5" style="color:#ea580c" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-3xl font-black" style="color:#c2410c;line-height:1">${d.ordenes_por_estatus.en_proceso || 0}</p>
                        <p class="text-[11px] font-bold mt-0.5" style="color:#ea580c">En Proceso</p>
                    </div>
                </div>

                <div class="rounded-2xl p-4 flex items-center gap-3" style="background:#f0fdf4">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                         style="background:#bbf7d0">
                        <svg class="w-5 h-5" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                  d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-3xl font-black" style="color:#15803d;line-height:1">${d.ordenes_por_estatus.listo || 0}</p>
                        <p class="text-[11px] font-bold mt-0.5" style="color:#16a34a">Listo</p>
                    </div>
                </div>

                <div class="rounded-2xl p-4 flex items-center gap-3" style="background:#f8fafc">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                         style="background:#e2e8f0">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-3xl font-black text-slate-500" style="line-height:1">${d.ordenes_por_estatus.entregado || 0}</p>
                        <p class="text-[11px] font-bold text-slate-400 mt-0.5">Entregado</p>
                    </div>
                </div>

            </div>
        </div>

        <!-- ── Histórico pendientes ── -->
        ${d.total_pendientes_entrega > 0 ? `
        <div class="card p-5 flex items-center gap-4" style="border-left:4px solid #ef4444">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0"
                 style="background:#fef2f2">
                <svg class="w-6 h-6" style="color:#ef4444" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <div class="flex-1">
                <p class="font-bold text-slate-800 text-sm">Sin entregar (histórico)</p>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Incluye días anteriores</p>
            </div>
            <p class="text-4xl font-black" style="color:#dc2626">${d.total_pendientes_entrega}</p>
        </div>` : `
        <div class="card p-5 flex items-center gap-4" style="border-left:4px solid #16a34a">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0"
                 style="background:#f0fdf4">
                <svg class="w-6 h-6" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <div>
                <p class="font-bold text-slate-800 text-sm">Todo entregado</p>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Sin órdenes pendientes históricas</p>
            </div>
        </div>`}
    `;
}

cargarDashboard();
setInterval(cargarDashboard, 30000);
</script>
{% endblock %}
