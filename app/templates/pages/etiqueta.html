<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiqueta Orden #{{ orden_id_str }} - {{ lavanderia.nombre }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
        }

        /* Botones de acción — solo en pantalla */
        .barra-acciones {
            width: 100%;
            max-width: 480px;
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn-accion {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            border: none;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-volver {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-imprimir {
            background: #1e293b;
            color: #fff;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }

        /* Etiqueta principal */
        .etiqueta {
            width: 100%;
            max-width: 480px;
            border: 4px solid #000;
            border-radius: 0;
            padding: 24px 20px;
            background: #fff;
        }

        .lavanderia-nombre {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
            margin-bottom: 14px;
        }

        .orden-numero {
            font-size: clamp(72px, 22vw, 120px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 6px;
        }

        .seccion-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #555;
            margin-top: 14px;
            margin-bottom: 3px;
        }

        .seccion-valor {
            font-size: 22px;
            font-weight: 900;
            line-height: 1.2;
        }

        .seccion-valor.grande {
            font-size: 26px;
        }

        .servicios-lista {
            font-size: 18px;
            font-weight: 900;
            line-height: 1.4;
        }

        .domicilio-box {
            margin-top: 16px;
            border: 3px solid #000;
            padding: 10px 12px;
            background: #000;
            color: #fff;
        }

        .domicilio-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: #ccc;
        }

        .domicilio-valor {
            font-size: 17px;
            font-weight: 900;
            line-height: 1.3;
        }

        .separador {
            border: none;
            border-top: 2px solid #000;
            margin: 14px 0;
        }

        .fecha-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 16px;
        }

        .fecha-texto {
            font-size: 13px;
            font-weight: 700;
            color: #333;
        }

        /* Loading / error */
        .estado-carga {
            width: 100%;
            max-width: 480px;
            text-align: center;
            padding: 48px 16px;
            font-size: 16px;
            font-weight: 700;
            color: #64748b;
        }

        @media print {
            .barra-acciones { display: none; }
            body { padding: 0; }
            .etiqueta {
                max-width: 100%;
                border: 3px solid #000;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="barra-acciones" id="barra-acciones" style="display:none">
    <a href="/" class="btn-accion btn-volver">← Volver</a>
    <button onclick="window.print()" class="btn-accion btn-imprimir">Imprimir</button>
    <button onclick="compartirWhatsApp()" class="btn-accion btn-whatsapp" id="btn-wa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp
    </button>
</div>

<div id="cargando" class="estado-carga">Cargando etiqueta…</div>

<div id="etiqueta" class="etiqueta" style="display:none">
    <div class="lavanderia-nombre" id="etiq-lavanderia">{{ lavanderia.nombre }}</div>

    <div class="orden-numero" id="etiq-numero">#{{ orden_id_str }}</div>

    <div class="seccion-label">Cliente</div>
    <div class="seccion-valor grande" id="etiq-cliente">—</div>

    <hr class="separador">

    <div class="seccion-label">Servicios</div>
    <div class="servicios-lista" id="etiq-servicios">—</div>

    <div id="domicilio-box" class="domicilio-box" style="display:none">
        <div class="domicilio-label">Entrega a domicilio</div>
        <div class="domicilio-valor" id="etiq-direccion">—</div>
    </div>

    <div class="fecha-row">
        <div>
            <div class="seccion-label">Recepción</div>
            <div class="fecha-texto" id="etiq-fecha">—</div>
        </div>
    </div>
</div>

<div id="error-msg" class="estado-carga" style="display:none; color:#dc2626">
    No se pudo cargar la orden.
</div>

<script>
const ORDEN_ID = {{ orden_id }};
const NOMBRE_LAVANDERIA = {{ lavanderia.nombre | tojson }};

let datosOrden = null;

async function cargarOrden() {
    try {
        const res = await fetch(`/api/ordenes/${ORDEN_ID}`);
        if (!res.ok) throw new Error('Error HTTP ' + res.status);
        const o = await res.json();
        datosOrden = o;
        renderEtiqueta(o);
    } catch (e) {
        document.getElementById('cargando').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
    }
}

function renderEtiqueta(o) {
    // Nombre cliente
    document.getElementById('etiq-cliente').textContent = o.cliente_nombre || '—';

    // Servicios: preferir detalle_servicios para listar por línea
    const serviciosEl = document.getElementById('etiq-servicios');
    if (o.detalle_servicios && o.detalle_servicios.length) {
        serviciosEl.innerHTML = o.detalle_servicios.map(s =>
            `<div>${s.servicios?.nombre || '—'}</div>`
        ).join('');
    } else if (o.servicios) {
        serviciosEl.innerHTML = o.servicios.split(',').map(s =>
            `<div>${s.trim()}</div>`
        ).join('');
    }

    // Domicilio
    if (o.es_domicilio && o.direccion_entrega) {
        document.getElementById('domicilio-box').style.display = 'block';
        document.getElementById('etiq-direccion').textContent = o.direccion_entrega;
    }

    // Fecha
    const fecha = new Date(o.created_at);
    document.getElementById('etiq-fecha').textContent = fecha.toLocaleDateString('es-PA', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });

    // Mostrar
    document.getElementById('cargando').style.display = 'none';
    document.getElementById('etiqueta').style.display = 'block';
    document.getElementById('barra-acciones').style.display = 'flex';
}

function compartirWhatsApp() {
    if (!datosOrden) return;
    const o = datosOrden;
    const num = String(o.id).padStart(4, '0');
    const fecha = new Date(o.created_at).toLocaleDateString('es-PA', {
        day: '2-digit', month: '2-digit', year: 'numeric'
    });

    let serviciosTexto = '';
    if (o.detalle_servicios && o.detalle_servicios.length) {
        serviciosTexto = o.detalle_servicios.map(s => `  - ${s.servicios?.nombre || '—'}`).join('\n');
    } else if (o.servicios) {
        serviciosTexto = o.servicios.split(',').map(s => `  - ${s.trim()}`).join('\n');
    }

    let domicilioTexto = '';
    if (o.es_domicilio && o.direccion_entrega) {
        domicilioTexto = `\n📍 Entrega a domicilio: ${o.direccion_entrega}`;
    }

    const msg = [
        `🧺 *${NOMBRE_LAVANDERIA}*`,
        `📋 Orden *#${num}*`,
        `👤 Cliente: ${o.cliente_nombre}`,
        ``,
        `🛁 Servicios:`,
        serviciosTexto,
        `📅 Recepción: ${fecha}`,
        domicilioTexto,
    ].filter(l => l !== undefined).join('\n').trim();

    const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
}

cargarOrden();
</script>
</body>
</html>
