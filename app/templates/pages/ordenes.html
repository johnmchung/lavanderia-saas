{% extends "base.html" %}
{% block title %}Órdenes - ECO PRETTY{% endblock %}

{% block content %}

<!-- Header row -->
<div class="flex items-center justify-between mb-5">
    <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Órdenes</h1>
        <p class="text-sm text-slate-400 font-medium mt-0.5" id="subtitle-fecha">Hoy</p>
    </div>
    <button onclick="cargarOrdenes(filtroActual)"
            class="w-10 h-10 rounded-xl flex items-center justify-center transition-all"
            style="background:#f1f5f9" title="Actualizar">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
    </button>
</div>

<!-- Filter chips -->
<div class="flex gap-2 overflow-x-auto pb-1 mb-5 -mx-1 px-1" id="filtros" style="scrollbar-width:none;-webkit-overflow-scrolling:touch">
    <button onclick="filtrar('')" data-val=""
            class="filtro-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all shrink-0"
            style="background:#16a34a;color:white;box-shadow:0 3px 10px rgba(22,163,74,0.25)">
        Todas
    </button>
    <button onclick="filtrar('recibido')" data-val="recibido"
            class="filtro-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all shrink-0"
            style="background:#eff6ff;color:#3b82f6">
        Recibido
    </button>
    <button onclick="filtrar('en_proceso')" data-val="en_proceso"
            class="filtro-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all shrink-0"
            style="background:#fff7ed;color:#ea580c">
        En Proceso
    </button>
    <button onclick="filtrar('listo')" data-val="listo"
            class="filtro-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all shrink-0"
            style="background:#f0fdf4;color:#16a34a">
        Listo
    </button>
    <button onclick="filtrar('entregado')" data-val="entregado"
            class="filtro-btn px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all shrink-0"
            style="background:#f8fafc;color:#64748b">
        Entregado
    </button>
</div>

<!-- Modal de pago -->
<div id="modal-pago" class="hidden fixed inset-0 z-50 flex items-end justify-center md:items-center" style="background:rgba(15,23,42,0.5)">
    <div class="w-full max-w-lg bg-white rounded-t-2xl md:rounded-2xl flex flex-col" style="max-height:85vh;box-shadow:0 -8px 40px rgba(0,0,0,0.15)">
        <!-- Header -->
        <div class="flex-shrink-0 px-6 pt-5 pb-4 border-b border-slate-100">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
            <div class="flex items-start justify-between">
                <div>
                    <h3 class="text-lg font-bold text-slate-900 mb-1">Registrar Pago</h3>
                    <p class="text-sm text-slate-400 font-medium">
                        Orden <span class="font-bold text-slate-600">#<span id="pago-orden-id"></span></span>
                        &nbsp;·&nbsp; Total
                        <span class="font-bold text-slate-900">$<span id="pago-total"></span></span>
                    </p>
                </div>
                <button onclick="cerrarModalPago()" class="ml-4 text-slate-400 hover:text-slate-600 transition-colors" style="line-height:1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Body -->
        <div class="flex-1 overflow-y-auto px-6 py-5">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Método de pago</p>
            <div class="grid grid-cols-2 gap-2.5">
                <button onclick="seleccionarMetodo('yappy')" data-metodo="yappy"
                        class="metodo-btn btn-touch rounded-2xl border-2 py-3 font-bold text-sm text-slate-700 transition-all"
                        style="border-color:#e2e8f0;background:#f8fafc">
                    💜 Yappy
                </button>
                <button onclick="seleccionarMetodo('nequi')" data-metodo="nequi"
                        class="metodo-btn btn-touch rounded-2xl border-2 py-3 font-bold text-sm text-slate-700 transition-all"
                        style="border-color:#e2e8f0;background:#f8fafc">
                    💗 Nequi
                </button>
                <button onclick="seleccionarMetodo('efectivo')" data-metodo="efectivo"
                        class="metodo-btn btn-touch rounded-2xl border-2 py-3 font-bold text-sm text-slate-700 transition-all"
                        style="border-color:#e2e8f0;background:#f8fafc">
                    💵 Efectivo
                </button>
                <button onclick="seleccionarMetodo('otro')" data-metodo="otro"
                        class="metodo-btn btn-touch rounded-2xl border-2 py-3 font-bold text-sm text-slate-700 transition-all"
                        style="border-color:#e2e8f0;background:#f8fafc">
                    🔄 Otro
                </button>
            </div>
        </div>
        <!-- Footer -->
        <div class="flex-shrink-0 border-t border-slate-100 px-6 py-4 flex gap-3">
            <button onclick="cerrarModalPago()" class="btn-secondary flex-1">Cancelar</button>
            <button onclick="confirmarPago()" id="btn-confirmar-pago"
                    class="btn-primary flex-1" style="padding:13px" disabled>
                Confirmar
            </button>
        </div>
    </div>
</div>

<!-- Order list -->
<div id="lista-ordenes" class="space-y-3">
    <!-- Skeleton -->
    <div class="card p-4 space-y-3">
        <div class="skeleton h-4 w-2/3"></div>
        <div class="skeleton h-3 w-1/2"></div>
        <div class="skeleton h-10 w-full"></div>
    </div>
    <div class="card p-4 space-y-3">
        <div class="skeleton h-4 w-3/4"></div>
        <div class="skeleton h-3 w-2/5"></div>
        <div class="skeleton h-10 w-full"></div>
    </div>
</div>

<script>
const ESTATUS = {
    recibido:   { bg: '#eff6ff', color: '#2563eb', accent: '#3b82f6', label: 'Recibido' },
    en_proceso: { bg: '#fff7ed', color: '#c2410c', accent: '#f97316', label: 'En Proceso' },
    listo:      { bg: '#f0fdf4', color: '#15803d', accent: '#22c55e', label: 'Listo' },
    entregado:  { bg: '#f8fafc', color: '#64748b', accent: '#94a3b8', label: 'Entregado' },
};
const SIGUIENTE = { recibido: 'en_proceso', en_proceso: 'listo', listo: 'entregado' };
const SIGUIENTE_LABEL = { recibido: 'En Proceso', en_proceso: 'Listo ✓', listo: 'Entregado' };

const BTN_NEXT_STYLE = {
    recibido:   'background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe',
    en_proceso: 'background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa',
    listo:      'background:linear-gradient(135deg,#16a34a,#15803d);color:white;border:none;box-shadow:0 3px 12px rgba(22,163,74,0.30)',
};

let filtroActual = '';
let pagoActual = { ordenId: null, monto: null, metodo: null };

async function cargarOrdenes(estatus = '') {
    const params = new URLSearchParams();
    if (estatus) params.set('estatus', estatus);
    else params.set('fecha', new Date().toISOString().split('T')[0]);

    const lista = document.getElementById('lista-ordenes');
    lista.innerHTML = `
        <div class="card p-4 space-y-3">
            <div class="skeleton h-4 w-2/3"></div>
            <div class="skeleton h-3 w-1/2"></div>
            <div class="skeleton h-10 w-full"></div>
        </div>
        <div class="card p-4 space-y-3">
            <div class="skeleton h-4 w-3/4"></div>
            <div class="skeleton h-3 w-2/5"></div>
            <div class="skeleton h-10 w-full"></div>
        </div>`;

    const res = await fetch(`/api/ordenes/?${params}`);
    const ordenes = await res.json();

    if (!ordenes.length) {
        lista.innerHTML = `
            <div class="text-center py-16 text-slate-400">
                <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:#f1f5f9">
                    <svg class="w-8 h-8 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <p class="font-bold text-slate-500 mb-1">Sin órdenes${estatus ? ' en este estado' : ' hoy'}</p>
                <a href="/nueva-orden"
                   class="inline-block mt-3 px-5 py-2.5 rounded-xl font-bold text-sm text-white"
                   style="background:linear-gradient(135deg,#16a34a,#15803d)">+ Nueva orden</a>
            </div>`;
        return;
    }

    lista.innerHTML = ordenes.map(o => {
        const est  = ESTATUS[o.estatus];
        const sig  = SIGUIENTE[o.estatus];
        const total  = parseFloat(o.precio_total || 0);
        const pagado = parseFloat(o.total_pagado  || 0);
        const esPagado = pagado >= total && total > 0;
        const hora = new Date(o.created_at).toLocaleTimeString('es-PA', { hour: '2-digit', minute: '2-digit' });
        const ordenNum = String(o.id).padStart(4, '0');

        // Entrega estimada badge
        let entregaBadge = '';
        if (o.fecha_entrega_estimada) {
            const entrega = new Date(o.fecha_entrega_estimada);
            const ahora = new Date();
            const hoyStr = ahora.toDateString();
            const entregaStr = entrega.toDateString();
            const entregaLabel = entrega.toLocaleString('es-PA', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const yaEntregado = o.estatus === 'entregado';
            let badgeStyle, alertIcon = '';
            if (!yaEntregado && entrega < ahora) {
                // Vencida
                badgeStyle = 'background:#fef2f2;color:#dc2626;border:1px solid #fecaca';
                alertIcon = '⚠️ ';
            } else if (!yaEntregado && entregaStr === hoyStr) {
                // Hoy
                badgeStyle = 'background:#fff7ed;color:#ea580c;border:1px solid #fed7aa';
            } else {
                // Futura o ya entregada
                badgeStyle = 'background:#f8fafc;color:#64748b;border:1px solid #e2e8f0';
            }
            entregaBadge = `<span class="inline-flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded-full mt-1" style="${badgeStyle}">
                🕐 ${alertIcon}${entregaLabel}
            </span>`;
        }

        return `
        <div class="card card-press overflow-hidden" style="border-left:4px solid ${est.accent}">
            <div class="p-4">

                <!-- Top: name + badge -->
                <div class="flex items-start justify-between gap-2 mb-3">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 flex-wrap mb-0.5">
                            <span class="font-bold text-slate-900 text-[15px]">${o.cliente_nombre}</span>
                            ${o.es_domicilio ? `
                            <span class="inline-flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded-full"
                                  style="background:#eff6ff;color:#3b82f6">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                                </svg>
                                Domicilio
                            </span>` : ''}
                        </div>
                        <span class="text-xs text-slate-400 font-medium">${o.cliente_telefono} · ${hora}</span>
                        ${entregaBadge}
                    </div>
                    <span class="badge shrink-0" style="background:${est.bg};color:${est.color}">
                        <span class="badge-dot" style="background:${est.color}"></span>
                        ${est.label}
                    </span>
                </div>

                <!-- Middle: services info row -->
                <div class="flex items-center justify-between px-3 py-2.5 rounded-xl mb-3" style="background:#f8fafc">
                    <div class="flex items-center gap-2 min-w-0 flex-1">
                        <svg class="w-3.5 h-3.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                        </svg>
                        <span class="text-xs text-slate-500 font-medium truncate">${o.servicios || '—'}</span>
                    </div>
                    <div class="flex items-center gap-2 shrink-0 ml-3">
                        <span class="text-xs text-slate-400 font-semibold">${o.kilos} kg</span>
                        <span class="text-base font-extrabold text-slate-900">$${total.toFixed(2)}</span>
                    </div>
                </div>

                <!-- Payment + order # -->
                <div class="flex items-center justify-between mb-3">
                    ${esPagado ? `
                    <span class="inline-flex items-center gap-1.5 text-xs font-bold" style="color:#16a34a">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                        Pagado
                    </span>` : `
                    <span class="inline-flex items-center gap-1.5 text-xs font-bold" style="color:#dc2626">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        Pendiente $${(total - pagado).toFixed(2)}
                    </span>`}
                    <span class="text-[11px] text-slate-300 font-mono font-bold">#${ordenNum}</span>
                </div>

                <!-- Action buttons -->
                <div class="flex gap-2">
                    ${sig ? `
                    <button onclick="cambiarEstatus(${o.id}, '${sig}')"
                            class="btn-touch flex-1 rounded-2xl font-bold text-sm transition-all"
                            style="${BTN_NEXT_STYLE[o.estatus] || 'background:#16a34a;color:white;border:none'};padding:12px 8px">
                        Marcar: ${SIGUIENTE_LABEL[o.estatus]}
                    </button>` : `
                    <div class="flex-1 flex items-center gap-1.5">
                        <svg class="w-4 h-4" style="color:#16a34a" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                        <span class="text-xs font-semibold" style="color:#16a34a">Completado</span>
                    </div>`}
                    ${!esPagado ? `
                    <button onclick="abrirModalPago(${o.id}, ${total})"
                            class="btn-touch rounded-2xl font-bold text-sm px-5 transition-all"
                            style="background:#f0fdf4;color:#16a34a;border:1.5px solid #86efac">
                        Cobrar
                    </button>` : ''}
                    <a href="/orden/${o.id}/etiqueta"
                       class="btn-touch rounded-2xl font-bold text-sm px-3 transition-all flex items-center justify-center gap-1"
                       style="background:#f8fafc;color:#475569;border:1.5px solid #e2e8f0">
                        🏷️ <span>Etiqueta</span>
                    </a>
                </div>

            </div>
        </div>`;
    }).join('');
}

async function cambiarEstatus(ordenId, nuevoEstatus) {
    const res = await fetch(`/api/ordenes/${ordenId}/estatus`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estatus: nuevoEstatus }),
    });
    if (res.ok) {
        cargarOrdenes(filtroActual);
        if (nuevoEstatus === 'listo') mostrarToast('Notificacion enviada al cliente');
    }
}

function abrirModalPago(ordenId, monto) {
    pagoActual = { ordenId, monto, metodo: null };
    document.getElementById('pago-orden-id').textContent = ordenId;
    document.getElementById('pago-total').textContent = monto.toFixed(2);
    document.getElementById('btn-confirmar-pago').disabled = true;
    document.querySelectorAll('.metodo-btn').forEach(b => {
        b.style.background = '#f8fafc';
        b.style.color = '#334155';
        b.style.borderColor = '#e2e8f0';
    });
    document.getElementById('modal-pago').classList.remove('hidden');
}

function cerrarModalPago() {
    document.getElementById('modal-pago').classList.add('hidden');
}

function seleccionarMetodo(metodo) {
    pagoActual.metodo = metodo;
    document.querySelectorAll('.metodo-btn').forEach(b => {
        const activo = b.dataset.metodo === metodo;
        b.style.background    = activo ? '#f0fdf4' : '#f8fafc';
        b.style.color         = activo ? '#15803d' : '#334155';
        b.style.borderColor   = activo ? '#16a34a' : '#e2e8f0';
    });
    document.getElementById('btn-confirmar-pago').disabled = false;
}

async function confirmarPago() {
    const { ordenId, monto, metodo } = pagoActual;
    if (!metodo) return;

    const res = await fetch(`/api/ordenes/${ordenId}/pagos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ monto, metodo }),
    });

    cerrarModalPago();
    if (res.ok) {
        cargarOrdenes(filtroActual);
        mostrarToast('Pago registrado correctamente');
    } else {
        mostrarToast('Error al registrar el pago', 'error');
    }
}

function filtrar(estatus) {
    filtroActual = estatus;
    document.querySelectorAll('.filtro-btn').forEach(btn => {
        const activo = btn.dataset.val === estatus;
        if (activo) {
            btn.style.background = '#16a34a';
            btn.style.color = 'white';
            btn.style.boxShadow = '0 3px 10px rgba(22,163,74,0.25)';
        } else {
            const styles = {
                '':          'background:#f1f5f9;color:#64748b;box-shadow:none',
                'recibido':  'background:#eff6ff;color:#3b82f6;box-shadow:none',
                'en_proceso':'background:#fff7ed;color:#ea580c;box-shadow:none',
                'listo':     'background:#f0fdf4;color:#16a34a;box-shadow:none',
                'entregado': 'background:#f8fafc;color:#64748b;box-shadow:none',
            };
            const s = styles[btn.dataset.val] || 'background:#f1f5f9;color:#64748b';
            s.split(';').forEach(rule => {
                const [prop, val] = rule.split(':');
                if (prop && val) btn.style[prop.trim().replace(/-([a-z])/g, (_, l) => l.toUpperCase())] = val.trim();
            });
        }
    });
    cargarOrdenes(estatus);
}

// Cerrar modal al tocar el fondo
document.getElementById('modal-pago').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalPago();
});

cargarOrdenes();
</script>
{% endblock %}
